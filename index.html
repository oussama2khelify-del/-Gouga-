<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
overflow:hidden;
font-family:Arial,sans-serif;
height:100vh;
background:linear-gradient(-45deg,#ff4d6d,#ff8fa3,#ff5d8f,#ffc2d1);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.gouga{

font-size:70px;
opacity:.08;
font-weight:bold;
color:white;

}

.card{

width:90%;
max-width:900px;
margin:30px auto;
padding:20px;
border-radius:25px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,255,255,.3);
text-align:center;
max-height:85vh;
overflow:auto;
}

img{
width:220px;
height:220px;
object-fit:cover;
border-radius:50%;
border:5px solid white;
box-shadow:0 0 30px pink;
}

h1{
margin:15px;
font-size:40px;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{transform:scale(1.08)}
}

#text{
white-space:pre-wrap;
line-height:1.8;
font-size:18px;
}

.heart,.spark{
position:absolute;
animation:float 8s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}

button{
padding:12px 24px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
margin:15px;
}
.buttons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin:15px 0;
}

#funText{
font-size:20px;
font-weight:bold;
margin:15px;
color:#fff;
text-shadow:0 0 10px pink;
}
button{
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px pink;
}
.night{
  background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e);
}
</style>
